<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>澳門央積金 · 自動計算器</title>
<style>
  :root { --bg:#faf8f5; --accent:#1a5276; --gold:#b8860b; --green:#27ae60; --red:#c0392b; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif; background:var(--bg); color:#1a1a1a; line-height:1.7; padding:24px; }
  .wrap { max-width:720px; margin:0 auto; }
  .head { text-align:center; margin-bottom:24px; }
  .head h1 { font-size:1.5em; font-weight:900; color:var(--accent); }
  .head p { color:#7f8c8d; font-size:0.9em; }
  .card { background:#fff; border-radius:12px; padding:22px 24px; margin-bottom:18px; box-shadow:0 1px 6px rgba(0,0,0,0.04); }
  .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:10px; }
  .row span { font-weight:600; }
  .row input { padding:8px 14px; border:2px solid #ddd; border-radius:8px; font-size:1em; width:100px; text-align:center; }
  .row input:focus { border-color:var(--accent); outline:none; }
  .row .btn { padding:8px 22px; background:var(--accent); color:#fff; border:none; border-radius:8px; font-size:1em; font-weight:600; cursor:pointer; }
  .tags { display:flex; gap:6px; flex-wrap:wrap; }
  .tags button { padding:4px 13px; border:1px solid #ddd; border-radius:16px; background:#fff; cursor:pointer; font-size:0.82em; color:#555; }
  .tags button.on { background:var(--accent); color:#fff; border-color:var(--accent); }
  .funds { display:flex; gap:0; background:#eef1f5; border-radius:10px; overflow:hidden; margin-top:12px; }
  .funds button { flex:1; padding:10px 0; border:none; background:transparent; cursor:pointer; font-size:0.85em; font-weight:600; color:#555; }
  .funds button.on { background:var(--accent); color:#fff; }
  .funds .sub { display:block; font-size:0.7em; font-weight:400; opacity:0.8; margin-top:2px; }
  .statrow { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin:0 0 22px; }
  .stat { background:#f8f9fa; border-radius:10px; padding:18px 14px; text-align:center; }
  .stat .lbl { font-size:0.8em; color:#888; margin-bottom:4px; }
  .stat .num { font-size:1.7em; font-weight:900; color:var(--accent); }
  .stat .num.g { color:var(--gold); }
  .stat .num.gr { color:var(--green); }
  .stat .sub { font-size:0.7em; color:#999; margin-top:2px; }
  h3 { font-size:1.05em; font-weight:800; margin:22px 0 8px; color:var(--accent); }
  .tblwrap { max-height:320px; overflow-y:auto; border-radius:8px; border:1px solid #e8e8e8; }
  table { width:100%; border-collapse:collapse; font-size:0.86em; }
  th { background:var(--accent); color:#fff; padding:8px 10px; text-align:left; position:sticky; top:0; }
  td { padding:7px 10px; border-bottom:1px solid #eee; }
  tr:nth-child(even) td { background:#fafafa; }
  .hl td { background:#fef9e7 !important; font-weight:700; }
  .cta { background:#fef9e7; border-radius:10px; padding:18px 20px; margin-top:18px; text-align:center; font-size:0.95em; }
  .note { color:#999; font-size:0.78em; margin-top:10px; }
  @media (max-width:560px) { body { padding:8px 4px 30px; } .statrow { grid-template-columns:1fr; } .stat .num { font-size:1.4em; } }
</style>
</head>
<body>
<div class="wrap">

<div class="head">
  <h1>💰 澳門央積金 · 自動計算器</h1>
  <p>輸入出生年份 · 自動計算政府歷年注資 + 轉入基金 vs 留在政府的差距 · 2026 年 7 月</p>
</div>

<div class="card">
  <div class="row">
    <span>出生年份：</span>
    <input id="birthYear" type="number" value="2001" min="1950" max="2004" placeholder="年份" onkeypress="if(event.key==='Enter')calc()">
    <button class="btn" onclick="calc()">計算</button>
  </div>
  <div class="funds" id="funds" style="display:none">
    <button data-rate="3">🛡️ 保守<span class="sub">貨幣基金 ~3%</span></button>
    <button data-rate="6" class="on">⚖️ 均衡<span class="sub">均衡基金 ~6%</span></button>
    <button data-rate="8">🚀 進取<span class="sub">高增長基金 ~8%</span></button>
  </div>
</div>

<div class="card" id="result" style="display:none"></div>

</div>

<div style="text-align:center;margin-top:28px;padding-top:16px;border-top:1px solid #e0d8c8">
  <p style="font-size:0.78em;color:#aaa;letter-spacing:1px;">Jim 黃仁傑 · 宏利保險顧問 · 2026</p>
  <p style="font-size:0.72em;color:#ccc;">央積金個人賬戶 · 政府管理子帳戶轉移 · 基金選擇諮詢</p>
</div>

<script>
const INJ = [
  [2010,10000,"啟動基本款項"],[2011,6000,"預算盈餘"],[2012,6000,"預算盈餘"],[2013,6000,"預算盈餘"],
  [2014,7000,"預算盈餘"],[2015,7000,"預算盈餘"],[2016,7000,"預算盈餘"],[2017,7000,"預算盈餘"],
  [2018,7000,"預算盈餘（央積金正式立法）"],[2019,7000,"預算盈餘"],[2020,7000,"預算盈餘"],
  [2021,0,"❌ 疫情停發"],[2022,0,"❌ 疫情停發"],[2023,0,"❌ 疫情停發"],
  [2024,7000,"恢復發放"],[2025,7000,"預算盈餘"],[2026,7000,"預算盈餘（7 月已批准）"]
];
const GR = 0.02;

function fm(n) { return n.toLocaleString(); }
function getRate() {
  const a = document.querySelector('#funds .on');
  return parseFloat(a.dataset.rate)/100;
}

function calc() {
  const by = parseInt(document.getElementById('birthYear').value);
  if (!by || by<1950 || by>2010) { alert('請輸入有效出生年份（1950-2010）'); return; }
  const age = 2026 - by;
  const to65 = Math.max(0, 65 - age);
  const fr = getRate();
  const fp = Math.round(fr*100);

  let prin=0, intt=0, bal=0, hist='', ec=0, first=false;
  for (const [yr,amt,note] of INJ) {
    if (yr-by < 22) continue;
    ec++;
    let act=amt, dsp=note;
    if (!first && amt>0) { act=10000; dsp="🎁 首次注資（啟動金 $10,000）"; first=true; }
    else if (amt>0) first=true;
    prin += act;
    const cmp = Math.round(act * 1.02**(2026-yr));
    intt += cmp - act;
    bal += cmp;
    hist += `<tr><td>${yr}</td><td>${yr-by} 歲</td><td>$${fm(act)}</td><td style="font-size:0.8em;color:#888">${dsp}</td></tr>`;
  }

  // projection years
  const st = Math.max(0, 22-age); // years until first contribution
  const ct = Math.max(0, to65-st); // total contribution years remaining

  const proj = [];
  if (to65<=5) proj.push(1,3,to65);
  else if (to65<=15) proj.push(5,10,to65);
  else if (to65<=25) proj.push(5,10,15,20,to65);
  else proj.push(5,10,20,30,to65);
  const yrs = [...new Set(proj)].sort((a,b)=>a-b);

  function fv(pv, r, n, contribs) {
    let t = pv * (1+r)**n;
    for (let i=0; i<contribs && st+i < n; i++) {
      const cy = st + i;
      const a = (i===0 && bal===0) ? 10000 : (i===0 && age>=22) ? 7000 : (i===0) ? 10000 : 7000;
      t += a * (1+r)**(n-cy);
    }
    return Math.round(t);
  }

  let prow = '';
  if (to65 <= 0) {
    prow = `<tr><td colspan="4" style="text-align:center;color:#888;padding:20px">已超過 65 歲退休年齡，不再有政府注資。<br>以下為現有餘額的複利增長（不含新供款）</td></tr>`;
    const n = 5; const ta = age+n;
    const vg = Math.round(bal * 1.02**n);
    const vf = Math.round(bal * (1+fr)**n);
    prow += `<tr><td><strong>${n} 年後（${ta} 歲）</strong></td><td>$${fm(vg)}</td><td style="color:var(--green);font-weight:700">$${fm(vf)}</td><td style="color:var(--red);font-weight:700">+$${fm(vf-vg)}</td></tr>`;
  } else {
  for (const n of yrs) {
    const ta = age+n;
    const lab = ta>=65 ? `${n} 年後（65 歲退休）` : `${n} 年後（${ta} 歲）`;
    const w = Math.min(ct, Math.max(0, n-st));
    const vg = fv(bal, 0.02, n, w);
    const vf = fv(bal, fr, n, w);
    prow += `<tr class="${ta>=65?'hl':''}"><td><strong>${lab}</strong></td><td>$${fm(vg)}</td><td style="color:var(--green);font-weight:700">$${fm(vf)}</td><td style="color:var(--red);font-weight:700">+$${fm(vf-vg)}</td></tr>`;
  }} // close for loop + else block

  const g65 = to65>0 ? fv(bal, 0.02, to65, ct) : bal;
  const f65 = to65>0 ? fv(bal, fr, to65, ct) : bal;
  const cta65 = to65>0
    ? `🏖️ <strong>65 歲退休時</strong><br>留在政府：<strong>$${fm(g65)}</strong> &nbsp;|&nbsp; 轉入基金 ${fp}%：<strong style="color:var(--green);">$${fm(f65)}</strong><br><span style="font-size:1.1em;color:var(--red);">同一筆錢，什麼都不用做，差 <strong>$${fm(f65-g65)}</strong></span>`
    : `🏖️ <strong>已超過 65 歲</strong> · 不再有政府注資<br>現有餘額仍可轉入基金，享受複利增長`;

  document.getElementById('result').style.display = 'block';
  document.getElementById('result').innerHTML = `
    <p style="margin-bottom:16px"><strong>${by} 年出生 · 今年 ${age} 歲</strong> · 距 65 歲退休還有 <strong>${to65} 年</strong> · 共 ${ec} 次合資格注資</p>
    <div class="statrow">
      <div class="stat"><div class="lbl">政府注資總本金</div><div class="num">$${fm(prin)}</div></div>
      <div class="stat"><div class="lbl">累計滾存利息</div><div class="num g">$${fm(Math.round(intt))}</div><div class="sub">政府帳戶 ~2% 年息</div></div>
      <div class="stat"><div class="lbl">目前帳戶約值</div><div class="num gr">$${fm(bal)}</div><div class="sub">本金 + 利息</div></div>
    </div>
    <h3>📜 歷年注資明細</h3>
    <div class="tblwrap"><table><tr><th>年份</th><th>年齡</th><th>注資金額</th><th>備註</th></tr>${hist}</table></div>
    <h3>📊 轉入基金（${fp}%）vs 留在政府帳戶（2%）· 未來差距</h3>
    <div class="funds" id="funds2" style="margin:0 0 12px"></div>
    <p style="color:#888;font-size:0.84em;margin-bottom:8px">假設政府繼續每年注資 $7,000</p>
    <div class="tblwrap"><table><tr><th>節點</th><th>留在政府 2%</th><th>轉入基金 ${fp}%</th><th>差額</th></tr>${prow}</table></div>
    <div class="cta">${cta65}</div>
    <p class="note">⚠️ 同一筆政府注資，同一個帳戶餘額——只差一個「放在哪裡」的選擇。基金回報為非保證，歷史數據僅供參考。</p>`;

  // clone fund buttons into result area (the real one stays at top as data source)
  const src = document.getElementById('funds');
  const dst = document.getElementById('funds2');
  if (dst) { dst.innerHTML = src.innerHTML; dst.querySelectorAll('button').forEach(b => { if (b.classList.contains('on') !== b.dataset.rate==String(fp)) { b.classList.toggle('on', b.dataset.rate==String(fp)); } }); }
}

document.addEventListener('click', e => {
  const b = e.target.closest('.funds button');
  if (!b) return;
  // sync both copies
  document.querySelectorAll('.funds button').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll(`.funds button[data-rate="${b.dataset.rate}"]`).forEach(x=>x.classList.add('on'));
  if (document.getElementById('result').style.display!=='none') calc();
});


calc();
</script>
</body>
</html>
